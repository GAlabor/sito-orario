name: Aggiorna sito

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aggiorna-sito
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Aggiorna index.html
        run: |
          ORA=$(TZ="Europe/Rome" date +"%H:%M:%S")
          DATA=$(TZ="Europe/Rome" date +"%d/%m/%Y")

          cat > index.html <<EOF
          <!DOCTYPE html>
          <html lang="it">
          <head>
            <meta charset="UTF-8">
            <title>Sito aggiornato</title>
          </head>
          <body>
            <h1>Il sistema è stato aggiornato</h1>
            <p>Alle ore: <strong>$ORA</strong></p>
            <p>Del giorno: <strong>$DATA</strong></p>
            <p>Evento GitHub Actions: <strong>${{ github.event_name }}</strong></p>
          </body>
          </html>
          EOF

      - name: Commit updated site
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Aggiornamento sito" || echo "Nessuna modifica da salvare"
          git push
